<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 넛메이커</title>
    <script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css)">
    <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js)"></script>
    <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js)"></script>
    <style>
        :root {
            --bg-dark: #000000;
            --text-light: #ffffff;
            --border-slot: #ef4444;
            --body-bg: #f3f4f6;
        }
        body {
            background-color: var(--body-bg) !important;
            transition: background-color 0.2s;
        }
        .rounded, .rounded-t, .rounded-b, .modal-content, header, footer, .color-text-set, .group-container {
            border-radius: 3px !important;
        }
        .no-round {
            border-radius: 0 !important;
        }
        .image-slot {
            border: 1px solid var(--border-slot);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            background-color: transparent; 
            position: relative;
            border-radius: 3px;
        }
        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .guide-text {
            color: var(--border-slot);
            opacity: 0.4;
            font-weight: bold;
            pointer-events: none;
            text-transform: uppercase;
        }
        .top-text-bar, .bottom-desc-bar, .text-slot-black, .bg-dark-custom {
            background-color: var(--bg-dark) !important;
            color: var(--text-light) !important;
            outline: none;
            border: none !important;
        }
        .top-text-bar {
            position: relative;
            width: 100%;
            height: 60px;
            margin-bottom: -1px;
            z-index: 1;
            overflow: hidden;
        }
        .top-text-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
            line-height: 1.1 !important;
            outline: none;
            white-space: nowrap;
        }
        .bottom-desc-bar {
            position: relative;
            width: 100%;
            min-height: 50px;
            margin-top: -1px;
            z-index: 1;
            overflow: hidden;
        }
        .bottom-desc-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            text-align: center;
            font-size: 0.875rem;
            line-height: 1.2;
            outline: none;
        }
        [contenteditable]:empty:before {
            content: attr(placeholder);
            color: var(--text-light);
            opacity: 0.4;
            cursor: text;
            pointer-events: none;
        }
        .color-picker-input {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            background: none;
            display: block;
            padding: 0;
        }
        .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker-input::-webkit-color-swatch { border: 1px solid #ccc; border-radius: 3px; }
        .color-text-set {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            background: none;
        }
        .color-swatch-container {
            position: relative;
            height: 40px;
            background-color: #00ff00;
            margin-bottom: -1px;
            z-index: 1;
        }
        .color-picker-main {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        #cropModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
        }
        .crop-container {
            max-height: 70vh;
            overflow: hidden;
        }
        .image-slot-fill {
            background-color: var(--bg-dark) !important;
            border: none !important;
        }
        #capture-area {
            background-color: var(--body-bg);
            padding: 20px;
        }
        .group-container {
            background-color: var(--bg-dark);
            overflow: hidden;
        }
        header {
            background-color: var(--bg-dark) !important;
            position: relative;
            width: 100%;
            height: 80px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        header div.header-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            line-height: 1.1 !important;
            outline: none;
        }
    </style>
</head>
<body class="p-6 font-sans">
    <!-- 본문 동일 (생략) -->
    <script>
        let currentSlot = null;
        let cropper = null;
        function updateTheme(variable, value) {
            document.documentElement.style.setProperty(variable, value);
            if (variable === '--body-bg') {
                document.getElementById('capture-area').style.backgroundColor = value;
            }
            if (variable === '--bg-dark') {
                document.querySelectorAll('.group-container, header, .top-text-bar, .bottom-desc-bar').forEach(el => {
                    el.style.backgroundColor = value;
                });
            }
        }
        function triggerUpload(element) {
            element.querySelector('input[type="file"]').click();
        }
        function openCropModal(input) {
            if (input.files && input.files[0]) {
                currentSlot = input.parentElement;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const modal = document.getElementById('cropModal');
                    const image = document.getElementById('cropTarget');
                    image.src = e.target.result;
                    modal.style.display = 'flex';
                    const rect = currentSlot.getBoundingClientRect();
                    const aspectRatio = rect.width / rect.height;
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(image, {
                        aspectRatio: aspectRatio,
                        viewMode: 1,
                        autoCropArea: 1,
                    });
                };
                reader.readAsDataURL(input.files[0]);
                input.value = "";
            }
        }
        function applyCrop() {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas();
            const croppedDataUrl = canvas.toDataURL();
            let img = currentSlot.querySelector('img');
            if (!img) {
                img = document.createElement('img');
                currentSlot.appendChild(img);
                const span = currentSlot.querySelector('span.guide-text');
                if (span) span.style.display = 'none';
            }
            img.src = croppedDataUrl;
            closeModal();
        }
        function closeModal() {
            document.getElementById('cropModal').style.display = 'none';
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        }
        async function saveAsImage() {
            const captureArea = document.getElementById('capture-area');
            if (document.activeElement) document.activeElement.blur();
            try {
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--body-bg'),
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    onclone: (clonedDoc) => {
                        // 텍스트 중앙 정렬 보정
                        const header = clonedDoc.querySelector('.header-inner');
                        if (header) {
                            header.style.position = 'absolute';
                            header.style.top = '50%';
                            header.style.left = '50%';
                            header.style.transform = 'translate(-50%, -55%)'; // 💡 세로 중앙 보정
                            header.style.lineHeight = '1.1';
                            header.style.margin = '0';
                        }
                        const inners = clonedDoc.querySelectorAll('.top-text-inner, .bottom-desc-inner');
                        inners.forEach(el => {
                            el.style.position = 'absolute';
                            el.style.top = '50%';
                            el.style.left = '50%';
                            el.style.transform = 'translate(-50%, -50%)';
                            el.style.lineHeight = '1.1';
                            el.style.margin = '0';
                        });
                    }
                });
                const link = document.createElement('a');
                link.download = 'nuts_sheet_' + new Date().getTime() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                console.error('저장 실패:', error);
            }
        }
    </script>
</body>
</html>
